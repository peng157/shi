<!DOCTYPE html>
<html>
<head>
    <title>我們的天數 ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            font-family: Arial;
            color: white;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-family: 'Love Ya Like A Sister', cursive;
            font-size: 80px;
            color: #fff;
            text-shadow: 2px 2px 4px #ff7eb3;
        }
        h2 { font-size: 48px; margin-top: 10px; }
        p { font-size: 22px; margin-top: 20px; }

        /* 照片牆 */
        .photo-wall {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        .photo-wall img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            margin: 5px;
            border-radius: 10px;
            border: 2px solid white;
        }

        /* 上傳按鈕 */
        .upload-btn input[type="file"] {
            padding: 10px;
            border-radius: 10px;
            border: none;
        }
        .upload-btn button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background-color: #fff;
            color: #ff7eb3;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>MY LOVE</h1>
    <h2>{{ days }} 天 ❤️</h2>

    {% if is_anniversary %}
        <p>今天是 {{ anniversary_day }} 天紀念日 🎉💖</p>
    {% endif %}

    <!-- 照片牆 -->
    <div class="photo-wall">
        {% for photo in photos %}
            <img src="{{ url_for('static', filename='photos/' + photo) }}">
        {% endfor %}
    </div>

    <!-- 上傳照片 -->
    <div class="upload-btn">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="photo" accept="image/*" required>
            <button type="submit">新增照片 ❤️</button>
        </form>
    </div>
</body>
</html>
