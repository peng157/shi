<!DOCTYPE html>
<html>
<head>
    <title>我們的天數 ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
}

/* 模擬手機畫面 */
.app-container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: white;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

/* 上方標題列 */
.header {
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    padding: 20px;
    color: white;
    text-align: center;
    font-family: 'Love Ya Like A Sister', cursive;
    font-size: 32px;
}

/* 主內容 */
.content {
    padding: 20px;
    text-align: center;
}

/* 天數 */
.days {
    font-size: 40px;
    font-weight: bold;
    color: #ff4d6d;
}

/* 紀念日 */
.anniversary {
    color: #ff758c;
    margin-top: 10px;
}

/* 照片牆 */
.photo-wall {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 20px;
}

.photo-wall img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
}

.photo-wall img:hover {
    transform: scale(1.05);
}

/* 上傳區 */
.upload-box {
    margin-top: 20px;
}

/* 隱藏原 input */
input[type="file"] {
    display: none;
}

/* 選擇按鈕 */
.cute-file-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #ffd1dc;
    color: #ff4d6d;
    border-radius: 20px;
    cursor: pointer;
    margin: 10px;
}

/* 上傳按鈕 */
.cute-upload-btn {
    padding: 10px 25px;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}
    </style>
</head>
<body>
   <div class="app-container">

    <div class="header">
        MY LOVE ❤️
    </div>

    <div class="content">

        <div class="days">
            {{ days }} 天
        </div>

        {% if is_anniversary %}
            <div class="anniversary">
                🎉 {{ anniversary_day }} 天紀念日
            </div>
        {% endif %}

        <!-- 照片牆 -->
        <div class="photo-wall">
            {% for photo in photos %}
                <img src="{{ url_for('static', filename='photos/' + photo) }}">
            {% endfor %}
        </div>

        <!-- 上傳 -->
        <div class="upload-box">
            <form method="POST" enctype="multipart/form-data">
                
                <label for="file" class="cute-file-btn">
                    📸 選擇照片
                </label>
                <input type="file" id="file" name="photo" accept="image/*" required>

                <br>

                <button class="cute-upload-btn">
                    💕 新增照片
                </button>

            </form>
        </div>

    </div>
</div>

</body>
</html>
