<!DOCTYPE html>
<html>
<head>
    <title>❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Love+Ya+Like+A+Sister&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom, #ff758c,#ff758c);
    display: flex;
    justify-content: center;
}

.app-container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #ff758c;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,0,0,0.2);
}

.header {
    padding: 20px;
    color: white;
    text-align: center;
    font-family: 'Love Ya Like A Sister', cursive;
    font-size: 32px;
}

.content {
    padding: 20px;
    text-align: center;
}

.days {
    font-size: 40px;
    font-weight: bold;
    color:#fcf9f9;
}

.anniversary {
    color:#fcf9f9;
    margin-top: 10px;
}

/* 照片牆 */
.photo-wall {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 20px;
}

.photo-item {
    position: relative;
}

.photo-wall img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 10px;
    touch-action: none; /* 禁用手勢 */
    position: relative;
    transition: transform 0.05s;
    z-index: 0;
}

/* 刪除按鈕 */
.delete-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(0,0,0,0.5);
    color: white;
    border-radius: 50%;
    padding: 4px 6px;
    text-decoration: none;
    font-size: 12px;
}

/* 上傳區 */
.upload-box {
    margin-top: 20px;
}

input[type="file"] {
    display: none;
}

.cute-file-btn {
    display: inline-block;
    padding: 10px 20px;
    background: #ffd1dc;
    color: #ff4d6d;
    border-radius: 20px;
    cursor: pointer;
    margin: 10px;
}

.cute-upload-btn {
    padding: 10px 25px;
    background: linear-gradient(45deg, #ff758c, #ff7eb3);
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="app-container">

    <div class="header">
        MY LOVE WITH HER ❤️
    </div>

    <div class="content">

        <div class="days">
            {{ days }} 天
        </div>

        {% if is_anniversary %}
            <div class="anniversary">
                🎉 {{ anniversary_day }} 天紀念日
            </div>
        {% endif %}

        <!-- 照片牆 -->
        <div class="photo-wall">
            {% for photo in photos %}
                <div class="photo-item">
                    <img src="{{ url_for('static', filename='photos/' + photo) }}">
                    <a href="/delete/{{ photo }}" class="delete-btn">🗑️</a>
                </div>
            {% endfor %}
        </div>

        <!-- 上傳 -->
        <div class="upload-box">
            <form method="POST" enctype="multipart/form-data">
                
                <label for="file" class="cute-file-btn">
                    📸 選擇照片
                </label>
                <input type="file" id="file" name="photo" accept="image/*" required>

                <br>

                <button class="cute-upload-btn">
                    💕 新增照片
                </button>

            </form>
        </div>

    </div>
</div>

<script>
// 互動照片牆
document.querySelectorAll('.photo-wall img').forEach(img => {
    let posX = 0, posY = 0, scale = 1, rotation = 0;
    let startX = 0, startY = 0;
    let startDistance = 0;
    let startAngle = 0;
    let moving = false;

    img.addEventListener('touchstart', e => {
        e.stopPropagation();
        if(e.touches.length === 1){
            moving = true;
            startX = e.touches[0].clientX - posX;
            startY = e.touches[0].clientY - posY;
        } else if(e.touches.length === 2){
            moving = false;
            startDistance = getDistance(e.touches) / scale;
            startAngle = getAngle(e.touches) - rotation;
        }
    });

    img.addEventListener('touchmove', e => {
        e.preventDefault();
        e.stopPropagation();
        if(e.touches.length === 1 && moving){
            posX = e.touches[0].clientX - startX;
            posY = e.touches[0].clientY - startY;
        } else if(e.touches.length === 2){
            scale = getDistance(e.touches) / startDistance;
            rotation = getAngle(e.touches) - startAngle;
        }
        img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale}) rotate(${rotation}deg)`;
    });

    img.addEventListener('touchend', e => {
        moving = false;
    });
});

function getDistance(touches){
    let dx = touches[0].clientX - touches[1].clientX;
    let dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
}

function getAngle(touches){
    let dx = touches[0].clientX - touches[1].clientX;
    let dy = touches[0].clientY - touches[1].clientY;
    return Math.atan2(dy, dx) * 180 / Math.PI;
}
</script>

</body>
</html>
